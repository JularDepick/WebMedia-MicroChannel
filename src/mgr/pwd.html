<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>密码生成器</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; background: #f5f5f7; color: #1a1a1e; }
        h1 { font-size: 20px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #666; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus { outline: none; border-color: #2080e0; }
        button { padding: 10px 24px; background: #2080e0; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
        button:hover { background: #1870c8; }
        .result { margin-top: 20px; padding: 12px; background: #fff; border: 1px solid #ddd; border-radius: 6px; word-break: break-all; font-family: monospace; font-size: 13px; display: none; }
    </style>
</head>
<body>
    <h1>密码生成器</h1>
    <div class="form-group">
        <label for="salt">盐值</label>
        <input type="text" id="salt" placeholder="输入配置文件中的盐值" />
    </div>
    <div class="form-group">
        <label for="user">用户名</label>
        <input type="text" id="user" placeholder="输入用户名" />
    </div>
    <div class="form-group">
        <label for="pass">密码</label>
        <input type="text" id="pass" placeholder="输入密码" />
    </div>
    <button id="genBtn">生成</button>
    <div class="result" id="result"></div>

    <script>
        document.getElementById('genBtn').addEventListener('click', async function() {
            var salt = document.getElementById('salt').value;
            var user = document.getElementById('user').value;
            var pass = document.getElementById('pass').value;
            if (!salt || !user || !pass) return;
            var raw = salt + '|' + user + '|' + pass;
            var encoder = new TextEncoder();
            var data = encoder.encode(raw);
            var hashBuffer = await crypto.subtle.digest('SHA-512', data);
            var hashArray = Array.from(new Uint8Array(hashBuffer));
            var hashHex = hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
            var resultEl = document.getElementById('result');
            resultEl.style.display = 'block';
            resultEl.textContent = hashHex;
        });
    </script>
</body>
</html>
